<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" style="background:#000000; border-radius: 20%;">
  <defs>
    <radialGradient id="portal-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#04ACFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heart-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#8B0000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background Ambient Glows -->
  <circle cx="180" cy="180" r="160" fill="url(#portal-glow)"/>
  <circle cx="332" cy="332" r="160" fill="url(#heart-glow)"/>

  <!-- Portal Loop (Consciousness Signal) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#04ACFF" stroke-width="4" stroke-dasharray="16 8" opacity="0.8"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#FAFAFA" stroke-width="2" opacity="0.3"/>

  <!-- Emotional Core (Human Red) -->
  <path d="M256 160 C256 160 170 120 170 210 C170 290 256 360 256 360 C256 360 342 290 342 210 C342 120 256 160 256 160 Z" fill="#8B0000" opacity="0.9"/>
  
  <!-- Subtle Internal Reflection/Signal -->
  <path d="M256 185 C256 185 195 155 195 210" fill="none" stroke="#FAFAFA" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
</svg>
